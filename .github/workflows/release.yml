name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify distributions
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # External actions are pinned to reviewed, immutable full commit SHAs.
      # Keep the human-readable release line in the trailing comment.
      - name: Check out the released tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Validate release tag against package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import runpy

          version_file = pathlib.Path("tabulint/_version.py")
          version = runpy.run_path(str(version_file))["__version__"]
          expected_tag = f"v{version}"
          actual_tag = os.environ["RELEASE_TAG"]
          if actual_tag != expected_tag:
              raise SystemExit(
                  f"Release tag {actual_tag!r} does not match package version {version!r}; "
                  f"expected {expected_tag!r}."
              )
          PY

      - name: Install verification and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,web,release]"

      - name: Run tests
        run: python -m pytest

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run Mypy
        run: python -m mypy tabulint

      - name: Compile Python sources
        run: python -m compileall -q tabulint web scripts examples

      - name: Build source and wheel distributions
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*

      - name: Upload verified distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified distributions
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/tabulint/
    permissions:
      contents: read
      id-token: write

    steps:
      # Download exactly the artifact produced by the unprivileged build job.
      - name: Download verified distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-distributions
          path: dist

      # Trusted Publishing exchanges GitHub's short-lived OIDC identity for
      # upload authority. No PyPI token is stored in repository secrets.
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
